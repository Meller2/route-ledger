name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK with captured log
        shell: bash
        run: |
          set +e
          mkdir -p ci-logs
          gradle :app:assembleDebug --stacktrace > ci-logs/latest-build-log.txt 2>&1
          status=$?
          cat ci-logs/latest-build-log.txt
          exit $status

      - name: Commit failure log
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p ci-logs
          git add ci-logs/latest-build-log.txt
          git commit -m "Add latest CI failure log [skip ci]" || true
          git push || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: route-ledger-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
